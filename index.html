<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Королевская осанка</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA настройки -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Осанка" />
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="theme-color" content="#232220" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'app-bg': '#cfc7b8',
              'card-bg': '#fefdfb',
              'dark-charcoal': '#232220',
              'text-secondary': '#6B7280',
              'accent-purple': '#f0c7ff',
              'accent-green': '#e7fcbb',
              'accent-beige': '#d5cdbe',
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            animation: {
              'ken-burns': 'ken-burns 20s ease-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'ken-burns': {
                '0%': { transform: 'scale(1) translate(0, 0)' },
                '50%': { transform: 'scale(1.1) translate(-2%, 2%)' },
                '100%': { transform: 'scale(1) translate(0, 0)' },
              },
            }
          },
        },
      }
    </script>
    <link rel="stylesheet" href="./index.css">

    <style>
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-top: env(safe-area-inset-top, 0px);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* ===== Install Banner (Forced Fullscreen) ===== */
      .install-banner {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #2a2028 0%, #232220 100%);
        color: #fff;
        padding: 2rem 1.5rem;
        z-index: 99999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .install-banner.show {
        display: flex;
      }

      .install-banner-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        width: 100%;
        max-width: 400px;
      }

      .install-banner-icon {
        width: 84px;
        height: 84px;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        flex-shrink: 0;
      }

      .install-banner-text {
        width: 100%;
      }

      .install-banner-title {
        font-size: 1.4rem;
        font-weight: 800;
        margin: 0 0 0.5rem;
        line-height: 1.2;
      }

      .install-banner-subtitle {
        font-size: 1rem;
        opacity: 0.85;
        margin: 0;
        line-height: 1.4;
      }

      .install-banner-btn {
        display: inline-block;
        padding: 1rem 2.5rem;
        background: linear-gradient(90deg, #c681f4 0%, #d38080 51%, #DAE2F8 100%);
        background-size: 200% auto;
        color: #fff;
        border: none;
        border-radius: 30px;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        text-align: center;
        box-shadow: 0 4px 20px rgba(198, 129, 244, 0.35);
        transition: transform 0.1s ease, background-position 0.3s ease;
      }

      .install-banner-btn:hover {
        background-position: right center;
      }

      .install-banner-btn:active {
        transform: scale(0.96);
      }

      .install-banner-steps {
        font-size: 1rem;
        opacity: 0.9;
        text-align: center;
        line-height: 1.6;
        max-width: 320px;
      }

      .install-banner-steps b {
        color: #c681f4;
      }

      .install-url-box {
        width: 100%;
        max-width: 320px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        padding: 0.7rem 1rem;
        color: #c681f4;
        font-size: 0.85rem;
        font-family: monospace;
        text-align: center;
        cursor: pointer;
        user-select: all;
        outline: none;
        box-sizing: border-box;
      }

      /* ===== iOS Safari visual guide ===== */
      .ios-guide {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        width: 100%;
        max-width: 320px;
      }

      .ios-steps-list {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 1rem 1.2rem;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        text-align: left;
      }

      .ios-step {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .ios-step-num {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #c681f4, #d38080);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 0.85rem;
        flex-shrink: 0;
      }

      .share-icon-inline {
        display: inline-block;
        width: 22px;
        height: 22px;
        vertical-align: middle;
        margin: 0 2px;
        position: relative;
        top: -1px;
      }

      /* Bouncing arrow pointing down */
      .ios-arrow-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        margin-top: 0.5rem;
      }

      .ios-arrow-label {
        font-size: 0.8rem;
        opacity: 0.6;
        letter-spacing: 0.05em;
      }

      .ios-bounce-arrow {
        font-size: 2.5rem;
        animation: ios-bounce 1.4s ease-in-out infinite;
        line-height: 1;
      }

      @keyframes ios-bounce {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(10px); opacity: 0.7; }
      }
    </style>
  </head>
  <body class="bg-dark-charcoal">

    <div class="relative h-screen w-screen max-w-2xl mx-auto overflow-hidden">
        <!-- Фоновое изображение с анимацией -->
        <div class="absolute inset-0">
            <img src="./images/natali.JPG" alt="Background" class="w-full h-full object-cover animate-ken-burns">
        </div>

        <!-- Градиент для затемнения -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/30 to-transparent"></div>

        <!-- Контент -->
        <div class="relative z-10 flex flex-col items-center justify-end h-full px-8 pb-24 text-center text-white">
            <h1 class="text-4xl font-bold drop-shadow-lg mb-">КОРОЛЕВСКИЙ КОМПЛЕКС</h1>
            <p class="text-lg mb-10 drop-shadow-md">ОСАНКА И ЛИЦО</p>
            <p class="text-lg mb-8 drop-shadow-md">Ваш путь к идеальной фигуре начинается здесь</p>
            <a href="./main.html" style="background-image: linear-gradient(to right, #c681f4 0%, #d38080  51%, #DAE2F8  100%); background-size: 200% auto;" class="w-full max-w-xs text-white font-bold py-4 px-8 rounded-2xl shadow-lg transform hover:scale-105 transition-transform duration-300 animate-pulse-slow hover:background-position-right">
                СТАРТ
            </a>
        </div>
    </div>

    <!-- Install Banner (Forced) -->
    <div class="install-banner" id="installBanner">
      <div class="install-banner-header">
        <img src="icon-192.png" alt="Icon" class="install-banner-icon">
        <div class="install-banner-text">
          <p class="install-banner-title" id="installTitle">Установите приложение</p>
          <p class="install-banner-subtitle" id="installSubtitle">Для продолжения необходимо установить приложение на ваш телефон</p>
        </div>
      </div>
      <button class="install-banner-btn" id="installBtn">Установить</button>
      <div class="install-banner-steps" id="installSteps"></div>
    </div>

    <script>
      // Сброс позиции скролла
      window.addEventListener('load', () => { window.scrollTo(0, 0); });

      // 1. Регистрация Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
      }

      // 2. Логика баннера установки
      (function () {
        const banner = document.getElementById('installBanner');
        const btn = document.getElementById('installBtn');
        const stepsEl = document.getElementById('installSteps');
        const titleEl = document.getElementById('installTitle');
        const subtitleEl = document.getElementById('installSubtitle');

        // Если уже установлено как приложение — выходим
        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;

        // === Определение платформы ===
        const ua = navigator.userAgent || '';
        const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/i.test(ua);

        // === Определение WebView (Telegram, Instagram, VK, Facebook) ===
        const isTelegram = /Telegram/i.test(ua);
        const isInstagram = /Instagram/i.test(ua);
        const isFacebook = /FBAN|FBAV/i.test(ua);
        const isVK = /VKAndroidApp|vk_app/i.test(ua);
        const isWebView = isTelegram || isInstagram || isFacebook || isVK || /\bwv\b/.test(ua);

        // === Определение браузера ===
        const isChrome = /Chrome/i.test(ua) && !/OPR|Opera|Edge|Edg|Samsung|UCBrowser|YaBrowser/i.test(ua) && !isWebView;
        const isSafari = /Safari/i.test(ua) && !/Chrome|CriOS|FxiOS|OPiOS|mercury|UCBrowser|YaBrowser/i.test(ua) && !isWebView;
        const isChromeIOS = /CriOS/i.test(ua);
        const isOpera = /OPR|Opera/i.test(ua);
        const isFirefox = /Firefox|FxiOS/i.test(ua);
        const isSamsung = /SamsungBrowser/i.test(ua);
        const isEdge = /Edg|Edge/i.test(ua);
        const isYandex = /YaBrowser/i.test(ua);
        const isUC = /UCBrowser/i.test(ua);

        let deferredPrompt = null;
        let bannerShown = false;

        // === Перехват события установки для Chrome ===
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          showBanner('native');
        });

        // === Для iOS и WebView — показываем баннер СРАЗУ ===
        if (isWebView) {
          showBanner('webview');
        } else if (isIOS && isSafari) {
          showBanner('ios-safari');
        } else if (isIOS && !isSafari) {
          // Chrome iOS, Firefox iOS и другие не-Safari браузеры на iOS
          showBanner('ios-other');
        }

        // === Для Chrome/Android/Desktop — ждём 1500мс на beforeinstallprompt ===
        if (!bannerShown) {
          setTimeout(() => {
            if (bannerShown) return;
            if (isAndroid && !deferredPrompt) {
              if (isChrome) {
                // Chrome Android: промпт не пришёл — показываем ручную инструкцию
                showBanner('android-chrome-manual');
              } else {
                showBanner('android-other');
              }
            } else if (!isAndroid && !isIOS && !deferredPrompt) {
              if (isChrome) {
                showBanner('desktop-chrome');
              } else {
                showBanner('desktop-other');
              }
            }
          }, 1500);
        }

        // === Название текущего браузера ===
        function getBrowserName() {
          if (isTelegram) return 'Telegram';
          if (isInstagram) return 'Instagram';
          if (isFacebook) return 'Facebook';
          if (isVK) return 'ВКонтакте';
          if (isOpera) return 'Opera';
          if (isFirefox) return 'Firefox';
          if (isSamsung) return 'Samsung Internet';
          if (isEdge) return 'Edge';
          if (isYandex) return 'Яндекс Браузер';
          if (isUC) return 'UC Browser';
          return 'этот браузер';
        }

        // === Открыть в Chrome через Android Intent ===
        function openInChrome() {
          const currentUrl = window.location.href;
          const url = new URL(currentUrl);
          const intentUrl = 'intent://' + url.host + url.pathname + url.search + url.hash +
            '#Intent;scheme=https;package=com.android.chrome;end';
          window.location.href = intentUrl;
        }

        // === Открыть в Safari через URL scheme (iOS) ===
        function openInSafari() {
          const currentUrl = window.location.href;
          // x-safari-https:// работает в Telegram, Chrome iOS и других WebView
          const safariUrl = currentUrl
            .replace(/^https:\/\//, 'x-safari-https://')
            .replace(/^http:\/\//, 'x-safari-http://');
          window.location.href = safariUrl;
        }

        // === Показать кнопку копирования ссылки (десктоп) ===
        function showDesktopChromePrompt(titleEl, subtitleEl, btn, stepsEl) {
          const currentUrl = window.location.href;
          titleEl.textContent = 'Откройте сайт в Chrome';
          subtitleEl.textContent = 'Для установки нужен Google Chrome';
          btn.textContent = 'Скопировать ссылку';
          btn.style.display = 'inline-block';
          stepsEl.innerHTML = 'Вставьте ссылку в <b>Google Chrome</b> — появится кнопка <b>«Установить»</b>';
          btn.onclick = () => {
            navigator.clipboard.writeText(currentUrl).then(() => {
              btn.textContent = '✓ Скопировано!';
              setTimeout(() => { btn.textContent = 'Скопировать ссылку'; }, 2500);
            }).catch(() => {
              const ta = document.createElement('textarea');
              ta.value = currentUrl;
              ta.style.cssText = 'position:fixed;opacity:0';
              document.body.appendChild(ta);
              ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
              btn.textContent = '✓ Скопировано!';
              setTimeout(() => { btn.textContent = 'Скопировать ссылку'; }, 2500);
            });
          };
        }

        // === Показать баннер ===
        function showBanner(mode) {
          if (bannerShown) return;
          bannerShown = true;
          banner.classList.add('show');

          if (mode === 'native') {
            // ✅ Chrome: нативная установка
            titleEl.textContent = 'Установите приложение';
            subtitleEl.textContent = 'Быстрый доступ с экрана "Домой"';
            btn.textContent = 'Установить';
            btn.style.display = 'inline-block';
            stepsEl.innerHTML = '';
            btn.onclick = async () => {
              if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                  banner.classList.remove('show');
                }
                deferredPrompt = null;
              }
            };

          } else if (mode === 'ios-safari') {
            // 📱 iOS Safari: визуальная инструкция
            titleEl.textContent = 'Добавьте на экран «Домой»';
            subtitleEl.textContent = 'Три шага — и приложение у вас!';
            btn.style.display = 'none';
            stepsEl.innerHTML = `
              <div class="ios-guide">
                <div class="ios-steps-list">
                  <div class="ios-step">
                    <div class="ios-step-num">1</div>
                    <span>Нажмите кнопку
                      <svg class="share-icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v13M7 7l5-5 5 5"/>
                        <path d="M20 16v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4"/>
                      </svg>
                      <b>внизу экрана</b></span>
                  </div>
                  <div class="ios-step">
                    <div class="ios-step-num">2</div>
                    <span>Выберите <b>«На экран «Домой»»</b></span>
                  </div>
                  <div class="ios-step">
                    <div class="ios-step-num">3</div>
                    <span>Нажмите <b>«Добавить»</b> — готово! 🎉</span>
                  </div>
                </div>
                <div class="ios-arrow-wrap">
                  <span class="ios-arrow-label">кнопка внизу</span>
                  <span class="ios-bounce-arrow">↓</span>
                </div>
              </div>`;

          } else if (mode === 'ios-other') {
            // 📱 iOS, не Safari → перенаправить в Safari (без копирования!)
            const browserName = getBrowserName();
            titleEl.textContent = 'Откройте в Safari';
            subtitleEl.textContent = 'Установить можно только через Safari';
            btn.textContent = '🧭 Открыть в Safari';
            btn.style.display = 'inline-block';
            stepsEl.innerHTML = `
              <div class="ios-guide">
                <div class="ios-steps-list">
                  <div class="ios-step">
                    <div class="ios-step-num">1</div>
                    <span>Нажмите кнопку ниже — откроется <b>Safari</b></span>
                  </div>
                  <div class="ios-step">
                    <div class="ios-step-num">2</div>
                    <span>В Safari нажмите
                      <svg class="share-icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v13M7 7l5-5 5 5"/>
                        <path d="M20 16v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4"/>
                      </svg>
                      <b>Поделиться</b> внизу</span>
                  </div>
                  <div class="ios-step">
                    <div class="ios-step-num">3</div>
                    <span>Выберите <b>«На экран «Домой»»</b> → <b>Добавить</b> 🎉</span>
                  </div>
                </div>
              </div>`;
            btn.onclick = () => { openInSafari(); };

          } else if (mode === 'android-other') {
            // 🤖 Android, не Chrome → перенаправить в Chrome
            const browserName = getBrowserName();
            titleEl.textContent = 'Откройте в Chrome';
            subtitleEl.textContent = browserName + ' не поддерживает установку';
            btn.textContent = 'Открыть в Chrome';
            btn.style.display = 'inline-block';
            stepsEl.innerHTML = 'В Chrome появится кнопка <b>«Установить»</b>';
            btn.onclick = () => { openInChrome(); };

          } else if (mode === 'webview') {
            // 💬 Telegram / Instagram / VK / Facebook
            const browserName = getBrowserName();
            if (isAndroid) {
              titleEl.textContent = 'Откройте в Chrome';
              subtitleEl.textContent = 'Установка из ' + browserName + ' невозможна';
              btn.textContent = 'Открыть в Chrome';
              btn.style.display = 'inline-block';
              stepsEl.innerHTML = 'В Chrome появится кнопка <b>«Установить»</b>';
              btn.onclick = () => { openInChrome(); };
            } else if (isIOS) {
              titleEl.textContent = 'Откройте в Safari';
              subtitleEl.textContent = 'Установка из ' + browserName + ' недоступна';
              btn.textContent = '🧭 Открыть в Safari';
              btn.style.display = 'inline-block';
              stepsEl.innerHTML = `
                <div class="ios-guide">
                  <div class="ios-steps-list">
                    <div class="ios-step">
                      <div class="ios-step-num">1</div>
                      <span>Нажмите кнопку ниже — откроется <b>Safari</b></span>
                    </div>
                    <div class="ios-step">
                      <div class="ios-step-num">2</div>
                      <span>В Safari нажмите
                        <svg class="share-icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M12 2v13M7 7l5-5 5 5"/>
                          <path d="M20 16v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4"/>
                        </svg>
                        <b>Поделиться</b> внизу</span>
                    </div>
                    <div class="ios-step">
                      <div class="ios-step-num">3</div>
                      <span>Выберите <b>«На экран «Домой»»</b> → <b>Добавить</b> 🎉</span>
                    </div>
                  </div>
                </div>`;
              btn.onclick = () => { openInSafari(); };
            } else {
              showDesktopChromePrompt(titleEl, subtitleEl, btn, stepsEl);
            }

          } else if (mode === 'android-chrome-manual') {
            // 🤖 Chrome Android: beforeinstallprompt не пришёл — ручная установка через меню
            titleEl.textContent = 'Установить в Chrome';
            subtitleEl.textContent = 'Два шага — и приложение на экране';
            btn.style.display = 'none';
            stepsEl.innerHTML = `
              <div class="ios-guide">
                <div class="ios-steps-list">
                  <div class="ios-step">
                    <div class="ios-step-num">1</div>
                    <span>Нажмите <b>⋮</b> (три точки) в правом верхнем углу</span>
                  </div>
                  <div class="ios-step">
                    <div class="ios-step-num">2</div>
                    <span>Выберите <b>«Добавить на главный экран»</b> → <b>Добавить</b> 🎉</span>
                  </div>
                </div>
              </div>`;

          } else if (mode === 'desktop-chrome') {
            // ✅ Chrome без промпта (нет HTTPS или критерии PWA не выполнены)
            titleEl.textContent = 'Установите приложение';
            subtitleEl.textContent = 'Нажмите кнопку установки в адресной строке';
            btn.style.display = 'none';
            stepsEl.innerHTML =
              'Найдите иконку <b>⊕</b> или <b>💻</b> в правой части адресной строки Chrome<br>' +
              'и нажмите <b>«Установить»</b>.<br><br>' +
              '<span style="opacity:0.6;font-size:0.85em">Если иконки нет — сайт должен быть открыт по HTTPS-адресу, а не из файла.</span>';

          } else if (mode === 'desktop-other') {
            // 🖥️ Десктоп (Firefox, Edge, Safari и т.д.)
            showDesktopChromePrompt(titleEl, subtitleEl, btn, stepsEl);
          }
        }

        // Крестик закрытия убран — установка принудительная
      })();
    </script>
  </body>
</html>
